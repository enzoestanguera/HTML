<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site 3D</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <img class="image-gradient" src="./src/gradient.png" alt="gradient">
    <div class="layer-blur"></div>

    <div class="container">
        <header> 
            <h1 class="logo">MCODE</h1>

            <nav>
                <a href="#">COMPANY</a>
                <a href="#">FEATURES</a>
                <a href="#">RESOURCES</a>
                <a href="#">DOCS</a>
            </nav>

            <button class="btn-signing">SIGN IN</button>
        </header>

        <main>
            <div class="content">
                <div class="tag-box">
                    <div class="tag">INTRODUCING ✦</div>
                </div>

                <h1>EMAIL FOR <br> DEVELOPERS</h1>

                <p class="description">
                    The best way to reach humans instead of spam folders. 
                    Deliver transactional and marketing emails at scale.
                </p>

                <div class="buttons">
                    <a href="#" class="btn-get-started">Documentation &gt;</a>
                    <a href="#" class="btn-signing-main">Get Started &gt;</a>
                </div>
            </div>
        </main>
        
        <spline-viewer class="robot-3d" url="https://prod.spline.design/2WvMugBYNl-rDrD5/scene.splinecode">
    </spline-viewer>
 </div>

<script type="module" src="https://unpkg.com/@splinetool/viewer@1.12.81/build/spline-viewer.js"></script>

</body>
</html>
